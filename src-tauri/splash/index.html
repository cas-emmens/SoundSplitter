<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SoundSplitter</title>
    <style>
      html, body {
        margin: 0; height: 100%;
        background: #0e0f13; color: #e7e9ee;
        font: 15px/1.5 system-ui, "Segoe UI", sans-serif;
      }
      .wrap {
        height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
      }
      .spinner {
        width: 38px; height: 38px; border-radius: 50%;
        border: 3px solid #2a2d36; border-top-color: #6c8cff;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .title { font-weight: 600; letter-spacing: 0.2px; }
      .sub { color: #8b909c; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <div class="title">Starting SoundSplitter…</div>
      <div class="sub" id="sub">Warming up the audio engine (first run can take a moment)</div>
    </div>
    <!--
      The Rust shell (src/lib.rs) launches the Python backend, waits until it is
      listening on 127.0.0.1:8000, then navigates this window to the real app.
      This page is only the loading screen.
    -->
  </body>
</html>
